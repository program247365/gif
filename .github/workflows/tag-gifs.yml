name: Tag new GIFs

on:
  push:
    branches: [master]
    paths:
      - "static/**"

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Tag untagged GIFs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run scripts/generate_tags.py

      - name: Regenerate dimensions
        run: uv run scripts/generate_dimensions.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tags.json dimensions.json
          git diff --staged --quiet || git commit -m "Auto-tag new GIFs" && git push
